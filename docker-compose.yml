services:
  lernfeld-docx:
    build:
      context: .
    container_name: lernfeld-docx
    ports:
      - "${APP_PORT:-3010}:3000"
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      OLLAMA_URL: "${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1:8b}"
      OLLAMA_EMBEDDING_MODEL: "${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}"
      OLLAMA_NUM_CTX: "${OLLAMA_NUM_CTX:-32768}"
      OLLAMA_NUM_PREDICT: "${OLLAMA_NUM_PREDICT:-4096}"
      OLLAMA_TIMEOUT_MS: "${OLLAMA_TIMEOUT_MS:-1800000}"
      AI_TIMEOUT_MS: "${AI_TIMEOUT_MS:-2700000}"
      SCENARIO_MODE: "${SCENARIO_MODE:-batch}"
      AI_DEBUG: "${AI_DEBUG:-0}"
      SEARXNG_URL: "${SEARXNG_URL:-http://host.docker.internal:8080}"
      UPLOAD_MAX_MB: "${UPLOAD_MAX_MB:-100}"
      PDF_MIN_TEXT_CHARS: "${PDF_MIN_TEXT_CHARS:-200}"
      PDF_OCR_ENABLED: "${PDF_OCR_ENABLED:-1}"
      PDF_OCR_LANG: "${PDF_OCR_LANG:-deu+eng}"
      PDF_OCR_MAX_PAGES: "${PDF_OCR_MAX_PAGES:-60}"
      PDF_OCR_DPI: "${PDF_OCR_DPI:-180}"
      PDF_OCR_TIMEOUT_MS: "${PDF_OCR_TIMEOUT_MS:-120000}"
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
