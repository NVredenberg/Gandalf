<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lernfeld-DOCX-Generator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Lokal</p>
            <h1>Lernfeld-DOCX-Generator</h1>
          </div>
          <div class="actions">
            <button id="scenariosButton" class="button secondary" type="button" disabled>
              Szenarien generieren
            </button>
            <button id="analyzeButton" class="button secondary" type="button" disabled>
              KI prüfen
            </button>
            <button id="renderButton" class="button primary" type="button" disabled>
              Speichern unter
            </button>
          </div>
        </header>

        <section class="upload-panel">
          <label class="file-picker">
            <input id="fileInput" type="file" accept=".md,.docx" />
            <span>Datei auswählen</span>
          </label>
          <div>
            <strong id="fileName">Keine Datei geladen</strong>
            <p id="statusText">Bereit</p>
          </div>
          <div id="serviceStatus" class="service-status checking" title="KI-Verbindung wird geprüft">
            <span>Homelab-KI</span>
            <strong id="ollamaStatus">Prüfe...</strong>
            <select id="modelSelect" class="model-select" aria-label="Sprachmodell">
              <option value="">Modell wird geladen</option>
            </select>
            <small id="ollamaDetails">Ollama</small>
          </div>
        </section>

        <section class="meta-panel" aria-label="Metadaten">
          <div>
            <span>Beruf</span>
            <input id="metaBeruf" class="meta-input" type="text" />
          </div>
          <div>
            <span>Fach</span>
            <input id="metaFach" class="meta-input" type="text" />
          </div>
          <div>
            <span>Lernfeld</span>
            <input id="metaLernfeld" class="meta-input" type="text" />
          </div>
          <div>
            <span>LS</span>
            <strong id="metaCount">0</strong>
          </div>
        </section>

        <section class="rag-panel" aria-label="RAG-Speicher">
          <div class="rag-summary">
            <span>RAG-Speicher</span>
            <strong id="ragCount">0 Beispiele</strong>
            <small id="ragDetails">Noch nicht geladen</small>
          </div>
          <div id="ragRecent" class="rag-recent"></div>
          <div class="rag-actions">
            <button id="ragRefreshButton" class="button secondary" type="button">
              Status aktualisieren
            </button>
            <button id="ragReindexButton" class="button secondary" type="button" disabled>
              Aktuelles Dokument indexieren
            </button>
            <button id="ragResetButton" class="button danger" type="button">
              RAG leeren
            </button>
          </div>
        </section>

        <section class="content-grid">
          <div>
            <h2>Erkannte Lernsituationen</h2>
            <div id="situationList" class="situation-list"></div>
          </div>
          <aside class="json-panel">
            <h2>Standardisiertes JSON</h2>
            <pre id="jsonPreview">{}</pre>
          </aside>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
