<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frodo & Gandalf</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace wizard-shell">
        <header class="topbar">
          <div>
            <p class="eyebrow">Assistenten</p>
            <h1>Frodo & Gandalf</h1>
          </div>
          <div class="actions">
            <a class="button secondary" href="/index.html">DOCX-Generator</a>
            <a class="button secondary" href="/admin.html">Admin</a>
          </div>
        </header>

        <section class="assistant-nav" aria-label="Assistentenauswahl">
          <a class="assistant-tab" data-assistant-tab="frodo" href="#frodo">Frodo</a>
          <a class="assistant-tab" data-assistant-tab="gandalf" href="#gandalf">Gandalf</a>
          <div class="model-inline">
            <span>Modell</span>
            <select id="assistantModelSelect" class="model-select" aria-label="Sprachmodell">
              <option value="">Standardmodell</option>
            </select>
          </div>
        </section>

        <section id="frodoPanel" class="assistant-panel" data-assistant-panel="frodo">
          <div class="wizard-status">
            <strong>Frodo</strong>
            <span id="frodoStatus">Bereit</span>
          </div>

          <section class="wizard-step" data-frodo-step="1">
            <header>
              <span>Schritt 1</span>
              <h2>Dokumente</h2>
            </header>
            <div class="form-grid two">
              <label>
                Rahmenlehrplan
                <input id="frodoPlanFile" type="file" accept=".pdf" />
              </label>
              <label>
                Prüfungskatalog
                <input id="frodoCatalogFile" type="file" accept=".pdf" />
              </label>
            </div>
            <div class="button-row">
              <button id="frodoUploadButton" class="button primary" type="button">
                PDFs prüfen
              </button>
              <button id="frodoStep1Next" class="button secondary" type="button" disabled>
                Weiter
              </button>
            </div>
            <div id="frodoUploadSummary" class="result-list"></div>
          </section>

          <section class="wizard-step hidden" data-frodo-step="2">
            <header>
              <span>Schritt 2</span>
              <h2>Lernfeld</h2>
            </header>
            <div class="form-grid two">
              <label>
                Fachrichtung oder Beruf
                <input id="frodoFachrichtung" type="text" placeholder="z. B. Kaufmann/Kauffrau für Büromanagement" />
              </label>
              <label>
                Lernfeld
                <input id="frodoLernfeld" type="text" placeholder="z. B. LF 5" />
              </label>
            </div>
            <div class="search-inline">
              <input id="frodoSearchQuery" type="text" placeholder="Optionale Websuche" />
              <button id="frodoSearchButton" class="button secondary" type="button">Suchen</button>
            </div>
            <div id="frodoSearchResults" class="result-list"></div>
            <div class="button-row">
              <button id="frodoBackToUpload" class="button secondary" type="button">Zurück</button>
              <button id="frodoAnalyzeButton" class="button primary" type="button">Analysieren</button>
            </div>
          </section>

          <section class="wizard-step hidden" data-frodo-step="3">
            <header>
              <span>Schritt 3</span>
              <h2>Analyse</h2>
            </header>
            <div id="frodoAnalysisEditor" class="analysis-editor"></div>
            <div class="form-grid two">
              <label>
                Anzahl Lernsituationen
                <input id="frodoLsCount" type="number" min="1" max="20" value="3" />
              </label>
              <label>
                Eigene Ergänzungen
                <textarea id="frodoOwnContent" rows="4"></textarea>
              </label>
            </div>
            <div class="button-row">
              <button id="frodoAnotherLfButton" class="button secondary" type="button">
                Weiteres LF analysieren
              </button>
              <button id="frodoToGandalfButton" class="button primary" type="button">
                An Gandalf übergeben
              </button>
            </div>
          </section>
        </section>

        <section id="gandalfPanel" class="assistant-panel hidden" data-assistant-panel="gandalf">
          <div class="wizard-status">
            <strong>Gandalf</strong>
            <span id="gandalfStatus">Bereit</span>
          </div>

          <section class="wizard-step" data-gandalf-step="1">
            <header>
              <span>Schritt 1</span>
              <h2>Grunddaten</h2>
            </header>
            <div class="form-grid three">
              <label>
                Anlage oder Beruf
                <input id="gandalfBeruf" type="text" />
              </label>
              <label>
                Fach
                <input id="gandalfFach" type="text" />
              </label>
              <label>
                Lernfeld
                <input id="gandalfLernfeld" type="text" />
              </label>
            </div>
            <div class="button-row">
              <button id="gandalfStep1Next" class="button primary" type="button">Weiter</button>
            </div>
          </section>

          <section class="wizard-step hidden" data-gandalf-step="2">
            <header>
              <span>Schritt 2</span>
              <h2>Rahmenlehrplan</h2>
            </header>
            <div class="form-grid two">
              <label>
                PDF hochladen
                <input id="gandalfPlanFile" type="file" accept=".pdf" />
              </label>
              <div class="search-inline compact-search">
                <input id="gandalfSearchQuery" type="text" placeholder="Beruf oder Lernfeld" />
                <button id="gandalfSearchButton" class="button secondary" type="button">Suchen</button>
              </div>
            </div>
            <div class="button-row">
              <button id="gandalfPlanUploadButton" class="button secondary" type="button">
                PDF übernehmen
              </button>
              <button id="gandalfPlanNext" class="button primary" type="button" disabled>
                Weiter
              </button>
            </div>
            <div id="gandalfPlanSummary" class="result-list"></div>
            <div id="gandalfSearchResults" class="result-list"></div>
          </section>

          <section class="wizard-step hidden" data-gandalf-step="3">
            <header>
              <span>Schritt 3</span>
              <h2>Modus</h2>
            </header>
            <div class="mode-grid" role="radiogroup" aria-label="Gandalf-Modus">
              <label><input type="radio" name="gandalfMode" value="extend" /> Digitale Kompetenzen ergänzen</label>
              <label><input type="radio" name="gandalfMode" value="revise" /> Vorhandene LS überarbeiten</label>
              <label><input type="radio" name="gandalfMode" value="create" checked /> Neue LS erstellen</label>
            </div>
            <label class="full-label">
              Vorhandene LS hochladen
              <input id="gandalfExistingFile" type="file" accept=".md,.docx" />
            </label>
            <div class="form-grid two">
              <label>
                Inhalte und Hinweise
                <textarea id="gandalfContentInput" rows="8"></textarea>
              </label>
              <label>
                Vorhandene LS
                <textarea id="gandalfExistingInput" rows="8"></textarea>
              </label>
            </div>
            <div class="form-grid two">
              <label>
                Anzahl Lernsituationen
                <input id="gandalfLsCount" type="number" min="1" max="20" value="3" />
              </label>
              <label>
                Lern- und Arbeitstechniken
                <input id="gandalfMethodsInput" type="text" />
              </label>
            </div>
            <div class="button-row">
              <button id="gandalfBackToPlan" class="button secondary" type="button">Zurück</button>
              <button id="gandalfStartButton" class="button primary" type="button">Starten</button>
            </div>
          </section>

          <section class="wizard-step hidden" data-gandalf-step="4">
            <header>
              <span id="gandalfLsProgress">Lernsituation</span>
              <h2>Prüfen</h2>
            </header>
            <div id="gandalfLsEditor" class="ls-editor"></div>
            <label class="full-label">
              Hinweise für die nächste LS
              <textarea id="gandalfNextHints" rows="3"></textarea>
            </label>
            <div class="button-row">
              <button id="gandalfRegenerateButton" class="button secondary" type="button">
                Neu generieren
              </button>
              <button id="gandalfApproveButton" class="button primary" type="button">
                Genehmigen & weiter
              </button>
            </div>
          </section>

          <section class="wizard-step hidden" data-gandalf-step="5">
            <header>
              <span>Schritt 5</span>
              <h2>Abschluss</h2>
            </header>
            <div id="gandalfFinalPreview" class="situation-list"></div>
            <div class="button-row">
              <button id="gandalfBackToLast" class="button secondary" type="button">
                Zurück zur letzten LS
              </button>
              <button id="gandalfFinalizeButton" class="button primary" type="button">
                In DOCX-Generator übernehmen
              </button>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="/frodo.js"></script>
    <script type="module" src="/gandalf.js"></script>
  </body>
</html>
